<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="advanced_style.css" />
    <title>Google Advanced Search</title>
  </head>
  <body>
    <header class="advanced_header">
      <div class="advanced_header_pages_link_box">
        <a class="advanced_header_link" href="index.html"
          ><img
            src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png"
            alt="Google"
            width="80"
            height="25"
        /></a>
        <a class="advanced_header_link" href="image.html"
          >Google Image Search</a
        >
      </div>
    </header>

    <main>
      <div class="msg_box">
        <span>Advanced Search</span>
      </div>

      <form action="https://www.google.com/search">
        <div class="advanced_search_wrapper">
          <div class="advanced_search_inner_wrapper">
            <div class="advanced_search_first_box">
              <span>다음 기준으로 페이지 검색...</span>
            </div>

            <div class="advanced_search_second_box"></div>
            <div class="advanced_search_third_box">
              검색창에서 검색하려면...
            </div>
          </div>

          <div class="advanced_search_inner_wrapper">
            <div class="advanced_search_first_box">
              <label for="all_included">다음 단어 모두 포함:</label>
            </div>
            <div class="advanced_search_second_box">
              <input
                class="advanced_search_input"
                type="text"
                name="as_q"
                id="all_included"
              />
            </div>
            <div class="advanced_search_third_box">
              중요 단어 입력: 오색 빛깔의 무지개떡
            </div>
          </div>

          <div class="advanced_search_inner_wrapper">
            <div class="advanced_search_first_box">
              <label for="all_included"
                >다음 단어 또는 문구 정확하게 포함:</label
              >
            </div>
            <div class="advanced_search_second_box">
              <input
                class="advanced_search_input"
                type="text"
                name="as_epq"
                id="all_included"
              />
            </div>
            <div class="advanced_search_third_box">
              정확한 단어를 인용부호로 묶어 입력: "랫테리어"
            </div>
          </div>

          <div class="advanced_search_inner_wrapper">
            <div class="advanced_search_first_box">
              <label for="all_included">다음 단어 중 아무거나 포함:</label>
            </div>
            <div class="advanced_search_second_box">
              <input
                class="advanced_search_input"
                type="text"
                name="as_oq"
                id="all_included"
              />
            </div>
            <div class="advanced_search_third_box">
              원하는 단어 사이에 OR 입력: 미니어처 OR 표준
            </div>
          </div>

          <div class="advanced_search_inner_wrapper">
            <div class="advanced_search_first_box">
              <label for="all_included">다음 단어 제외:</label>
            </div>
            <div class="advanced_search_second_box">
              <input
                class="advanced_search_input"
                type="text"
                name="as_eq"
                id="all_included"
              />
            </div>
            <div class="advanced_search_third_box">
              제외하려는 단어 바로 앞에 빼기 기호(-) 입력: -설치류, -"잭러셀"
            </div>
          </div>

          <div class="advanced_search_inner_wrapper">
            <div class="advanced_search_first_box"></div>
            <div class="advanced_search_second_box">
              <div class="advanced_search_btn_box">
                <input
                  class="advanced_search_submit_btn"
                  type="submit"
                  value="Advanced Search"
                />
              </div>
            </div>
            <div class="advanced_search_third_box"></div>
          </div>
        </div>
      </form>
    </main>
  </body>
</html>
